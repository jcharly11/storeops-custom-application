<head>
  <title>EPC Visualizer</title>
  <meta charset="utf-8">
  <link href="apps.css" type="text/css" rel="stylesheet">
  <script src="../base1/cockpit.js"></script>
  <script src="jquery.js" type="text/javascript"></script>
  <link href="table.css" type="text/css" rel="stylesheet">
  <script src="jquery.dataTables.js" type="text/javascript"></script>
  <link href="jquery.dataTables.css" type="text/css" rel="stylesheet">
</head>
<body class="pf-m-redhat-font">
  <div class="ct-page-fill">
     <div class="pf-c-page">
        <main class="pf-c-page__main" tabindex="-1">
           <section class="pf-c-page__main-section pf-m-light">
              <h2>Events Visualizer</h2>
              <p>This page can be used to visualze events on alarmbox.</p>
              <br>
              <hr>
              <br>
              <div class="pf-c-card__body">
                 <h4>Upload excel or CSV file</h4>
                 <div class="pf-l-stack__item">
                    <input class="pf-c-file-upload" type="file"  id="file-xls-input" name="file-xls-input"  placeholder="" accept=".csv,application/vnd.ms-excel,.xlt,application/vnd.ms-excel,.xla,application/vnd.ms-excel,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,.xltx,application/vnd.openxmlformats-officedocument.spreadsheetml.template,.xlsm,application/vnd.ms-excel.sheet.macroEnabled.12,.xltm,application/vnd.ms-excel.template.macroEnabled.12,.xlam,application/vnd.ms-excel.addin.macroEnabled.12,.xlsb,application/vnd.ms-excel.sheet.binary.macroEnabled.12">
                    <button class="pf-c-button pf-m-primary" id="submit-button">Submit</button>
                    <button class="pf-c-button pf-m-primary" id="refresh-button">Refresh</button>
                    <button class="pf-c-button pf-m-primary" id="clear-button">Clear</button>
                 </div>
              </div>
           </section>
           <section>
              <article>
                 <div class="pdp-tabs">
                    <input id="tab-one" type="radio" name="grp" checked="checked" />
                    <label for="tab-one">Summary</label>
                    <div class="pdp-tab-content">
                       <h1>Summary</h1>
                       <div class="container-summary">
                          <div class="lateral-box">
                             <h3>Total</h3>
                             <h4 id="total-events">0</h4>
                          </div>
                          <div class="box-2">
                             <div class="row-event" id="row-event">
                                <!-- <div class="child-event">
                                   <h5>Uknown</h3>
                                   <h6 id="total-events">29</h4>
                                   </div> -->
                             </div>
                          </div>
                          <div class="lateral-box">
                             <h3>Uknown</h3>
                             <h4 id="total-events-unknown">0</h4>
                          </div>
                       </div>
                    </div>
                    <input id="tab-two" type="radio" name="grp" />
                    <label for="tab-two">Events</label>
                    <div class="pdp-tab-content">
                       <h1>Events</h1>
                       <table id="know-epcs">
                          <thead>
                             <tr>
                                <th>TimeStamp</th>
                                <th>Event</th>
                                <th>Description</th>
                                <th>Image</th>
                             </tr>
                          </thead>
                          <tbody id="table-visualizer-container">
                          </tbody>
                       </table>
                    </div>
                    <input id="tab-three" type="radio" name="grp" />
                    <label for="tab-three">Uknown EPCs</label>
                    <div class="pdp-tab-content">
                       <h1>Uknown EPCs</h1>
                       <table id="unknow-epcs">
                          <thead>
                             <tr>
                                <th>TimeStamp</th>
                                <th>Event</th>
                                <th>EPC</th>
                             </tr>
                          </thead>
                          <tbody id="table-visualizer-container-epcs">
                          </tbody>
                       </table>
                    </div>
                 </div>
              </article>
           </section>
        </main>
     </div>
  </div>
  <script>
     $.fn.dataTableExt.oSort['time-date-sort-pre'] = function(value) {      
       return Date.parse(value);
     };
     $.fn.dataTableExt.oSort['time-date-sort-asc'] = function(a,b) {      
       return a-b;
     };
     $.fn.dataTableExt.oSort['time-date-sort-desc'] = function(a,b) {
       return b-a;
     };
     
        
        
  </script>  
  <script src="index.js"></script>
</body>
</html>
